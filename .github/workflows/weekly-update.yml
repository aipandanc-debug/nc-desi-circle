name: Weekly Business Data Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Google API Key
        id: check
        run: |
          if [ -z "${{ secrets.GOOGLE_PLACES_API_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        if: steps.check.outputs.has_key == 'true'
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          pip install requests
          python scripts/scrape_businesses.py || echo "Scraper had issues, continuing..."

      - name: Install Node dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Commit if changes
        if: steps.check.outputs.has_key == 'true'
        run: |
          git config user.name "Bot" && git config user.email "bot@ncdesi.com"
          git add src/data/businesses.ts
          git diff --cached --quiet || (git commit -m "weekly update $(date +%Y-%m-%d)" && git push)

      - name: Report status
        run: |
          echo "Build done!"
          if [ "${{ steps.check.outputs.has_key }}" == "false" ]; then
            echo "Tip: Add GOOGLE_PLACES_API_KEY secret to enable auto-scraping"
          fi
